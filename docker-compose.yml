version: '3.8'
services:
  tbvh:
    image: deepsp94/tbvh-tee-core:v2
    user: root
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TEE_MODE=production
      - DSTACK_SIMULATOR_ENDPOINT=/var/run/tappd.sock
      - PHALA_API_KEY=${PHALA_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SIWE_DOMAIN=${SIWE_DOMAIN}
      - DB_PATH=/data/tbvh.db
      - CHAIN_ID=${CHAIN_ID:-84532}
      - ESCROW_CONTRACT=${ESCROW_CONTRACT}
      - USDC_CONTRACT=${USDC_CONTRACT}
    volumes:
      - tbvh-data:/data
      - /var/run/tappd.sock:/var/run/tappd.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
volumes:
  tbvh-data:
